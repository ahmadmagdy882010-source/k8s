name: first workflow


on:
  push:
    branches:
      - main

jobs:
  First-job:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        node: [20, 22]
    environment: megz
    defaults:
      run:
        shell: bash

    steps:
      - name: print a welcome message
        run: echo "welcome ya prins ${{ vars.TEST }} ${{ vars.DAD }}"
      - name: password test
        run: echo "Password is ${{ secrets.PASS }}"
      - run: echo "APP_ENV=staging" >> "$GITHUB_ENV"
      - run: echo "$APP_ENV"
      - name: check code
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: confirm version
        run: npm test
